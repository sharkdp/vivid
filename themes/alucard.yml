colors:
  # Based on 'Alucard Classic' theme (Light variant of Dracula)
  # Official Specs: https://draculatheme.com/spec
  
  bg           :  'fffbeb' # Background
  fg           :  '1f1f1f' # Foreground
  selection    :  'cfcfde' # Selection
  comment      :  '6c664b' # Comment / Current Line
  red          :  'cb3a2a'
  orange       :  'a34d14'
  yellow       :  '846e15'
  green        :  '14710a'
  cyan         :  '036a96'
  purple       :  '644ac9'
  pink         :  'a3144d'

